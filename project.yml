name: vish
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    CLANG_ENABLE_MODULES: YES
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts.git
    version: 1.17.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    version: 2.9.1
schemes:
  vish:
    build:
      targets:
        vish: all
    run:
      config: Debug
targets:
  vish:
    type: application
    platform: macOS
    supportedDestinations:
      - macOS
    sources:
      - path: vish
        excludes:
          - Resources/Info.plist
          - vish.entitlements
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vish.app
        PRODUCT_NAME: vish
        INFOPLIST_FILE: vish/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: vish/vish.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "5"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        VISH_SPARKLE_FEED_URL: "https://raw.githubusercontent.com/itisrmk/VISH/main/appcast.xml"
        VISH_SPARKLE_PUBLIC_ED_KEY: "6ir0pzMbfSy/Jo73NC8GlOIRX2Rv5WjN3aZgfh9bmbk="
